<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>유튜브 썸네일 추출기 Pro</title>
    <link rel="icon" href="https://www.youtube.com/s/desktop/28ea6708/img/favicon_32x32.png">

    <meta property="og:type" content="website">
    <meta property="og:title" content="유튜브 썸네일 추출기(by 빛나리)">
    <meta property="og:description" content="클릭 한 번으로 유튜브 고화질 썸네일을 간편하게 추출하고 다운로드하세요!">
    <meta property="og:image" content="https://raw.githubusercontent.com/captainhook3190/youtube-thumbnail/main/Gemini_Generated_Image_lvos2xlvos2xlvos.png"> 
    <meta property="og:url" content="https://본인아이디.github.io/저장소이름/">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="유튜브 썸네일 추출기 Pro">
    <meta name="twitter:description" content="고화질 유튜브 썸네일 다운로드 서비스">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/본인아이디/저장소이름/main/preview.png">

    <style>
        :root {
            --primary-color: #ff0000;
            --bg-color: #f9f9f9;
            --text-color: #333;
        }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: var(--bg-color); text-align: center; padding: 20px; margin: 0; color: var(--text-color); }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.07); }
        
        /* 메인 타이틀 정렬 */
        .main-title { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 35px; 
            font-size: 28px;
            font-weight: 800;
        }
        .main-title svg { width: 40px; height: 40px; }
        
        /* 입력창 디자인 */
        .input-group { display: flex; gap: 10px; margin-bottom: 40px; justify-content: center; flex-wrap: wrap; }
        input { flex: 1; min-width: 280px; max-width: 550px; padding: 16px 20px; border: 2px solid #eee; border-radius: 12px; outline: none; transition: all 0.3s; font-size: 16px; }
        input:focus { border-color: var(--primary-color); box-shadow: 0 0 10px rgba(255,0,0,0.1); }
        
        button.extract-btn { background: var(--primary-color); color: white; border: none; padding: 16px 32px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button.extract-btn:hover { background: #cc0000; transform: translateY(-2px); }
        
        /* 결과 그리드 */
        #result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 20px; }
        .thumb-card { background: #fff; border: 1px solid #f0f0f0; border-radius: 16px; padding: 20px; transition: all 0.3s; }
        .thumb-card:hover { transform: translateY(-8px); box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .thumb-card img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        .thumb-card h4 { margin: 10px 0; color: #666; font-size: 15px; }
        
        /* 다운로드 버튼 */
        .download-btn { display: inline-block; width: 100%; background: #222; color: white; text-decoration: none; padding: 13px 0; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; font-weight: 600; transition: 0.2s; }
        .download-btn:hover { background: #000; }

        @media (max-width: 600px) {
            .container { padding: 25px 15px; }
            .main-title { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="main-title">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#FF0000">
            <path d="M19.615 3.184c-3.604-.242-11.625-.242-15.23 0-3.897.262-4.385 2.807-4.385 8.816s.488 8.554 4.385 8.816c3.604.242 11.625.242 15.23 0 3.897-.262 4.385-2.807 4.385-8.816s-.488-8.554-4.385-8.816zm-10.615 12.816v-8l8 4-8 4z"/>
        </svg>
        <span>유튜브 썸네일 추출기 Pro</span>
    </h2>
    
    <div class="input-group">
        <input type="text" id="videoUrl" placeholder="유튜브 영상 링크를 붙여넣으세요">
        <button class="extract-btn" onclick="extractThumbnails()">추출하기</button>
    </div>

    <div id="result-grid">
        </div>
</div>

<script>
    async function extractThumbnails() {
        const url = document.getElementById('videoUrl').value;
        const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
        const match = url.match(regExp);
        const videoId = (match && match[7].length == 11) ? match[7] : false;

        if (!videoId) {
            alert("유효한 유튜브 링크를 입력해주세요!");
            return;
        }

        const grid = document.getElementById('result-grid');
        grid.innerHTML = '<p style="grid-column: 1/-1;">썸네일을 불러오는 중...</p>'; 

        const qualities = [
            { name: 'maxresdefault.jpg', label: '최고화질 (HD)', id: 'MAX' },
            { name: 'sddefault.jpg', label: '표준화질 (SD)', id: 'SD' },
            { name: 'hqdefault.jpg', label: '고화질 (HQ)', id: 'HQ' },
            { name: 'mqdefault.jpg', label: '중간화질 (MQ)', id: 'MQ' }
        ];

        // 딜레이를 약간 주어 로딩 효과를 줌
        setTimeout(() => {
            grid.innerHTML = '';
            qualities.forEach(q => {
                const imgUrl = `https://img.youtube.com/vi/${videoId}/${q.name}`;
                const card = document.createElement('div');
                card.className = 'thumb-card';
                card.innerHTML = `
                    <h4>${q.label}</h4>
                    <img src="${imgUrl}" alt="${q.label}" onerror="this.parentElement.style.display='none'">
                    <button class="download-btn" onclick="downloadImage('${imgUrl}', 'youtube-thumb-${q.id}.jpg')">이미지 저장하기</button>
                `;
                grid.appendChild(card);
            });
        }, 300);
    }

    async function downloadImage(url, filename) {
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(blobUrl);
        } catch (error) {
            alert('보안 정책상 바로 다운로드가 어려울 수 있습니다. 이미지를 길게 눌러 저장해주세요.');
        }
    }
</script>

</body>
</html>
