<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유튜브 썸네일 추출기 Pro</title>
    <style>
        :root {
            --primary-color: #ff0000;
            --bg-color: #f9f9f9;
            --text-color: #333;
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); text-align: center; padding: 20px; margin: 0; color: var(--text-color); }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        /* 💡 수정된 제목 스타일: 로고와 글자 정렬 */
        .main-title { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; /* 로고와 글자 사이 간격 */
            margin-bottom: 30px; 
            font-size: 26px;
            font-weight: 800;
        }
        .main-title svg {
            width: 32px; /* 로고 크기 */
            height: 32px;
        }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap; }
        input { flex: 1; min-width: 280px; max-width: 500px; padding: 14px 18px; border: 2px solid #ddd; border-radius: 8px; outline: none; transition: border-color 0.3s; font-size: 15px; }
        input:focus { border-color: var(--primary-color); }
        button.extract-btn { background: var(--primary-color); color: white; border: none; padding: 14px 28px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; }
        button.extract-btn:hover { background: #cc0000; }
        
        #result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .thumb-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 18px; transition: transform 0.2s, box-shadow 0.2s; }
        .thumb-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .thumb-card img { width: 100%; border-radius: 8px; margin-bottom: 18px; }
        .thumb-card h4 { margin: 10px 0; color: #555; font-size: 15px; }
        
        .download-btn { display: inline-block; width: 100%; background: #333; color: white; text-decoration: none; padding: 12px 0; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; font-weight: 600; }
        .download-btn:hover { background: #000; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="main-title">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#FF0000">
            <path d="M19.615 3.184c-3.604-.242-11.625-.242-15.23 0-3.897.262-4.385 2.807-4.385 8.816s.488 8.554 4.385 8.816c3.604.242 11.625.242 15.23 0 3.897-.262 4.385-2.807 4.385-8.816s-.488-8.554-4.385-8.816zm-10.615 12.816v-8l8 4-8 4z"/>
        </svg>
        <span>유튜브 썸네일 추출기 Pro</span>
    </h2>
    
    <div class="input-group">
        <input type="text" id="videoUrl" placeholder="유튜브 영상 링크를 입력하세요 (예: https://youtu.be/...)">
        <button class="extract-btn" onclick="extractThumbnails()">추출하기</button>
    </div>

    <div id="result-grid">
        </div>
</div>

<script>
    async function extractThumbnails() {
        const url = document.getElementById('videoUrl').value;
        const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
        const match = url.match(regExp);
        const videoId = (match && match[7].length == 11) ? match[7] : false;

        if (!videoId) {
            alert("유효한 유튜브 링크를 입력해주세요!");
            return;
        }

        const grid = document.getElementById('result-grid');
        grid.innerHTML = ''; // 이전 결과 초기화

        const qualities = [
            { name: 'maxresdefault.jpg', label: '최고화질 (HD)', id: 'MAX' },
            { name: 'sddefault.jpg', label: '표준화질 (SD)', id: 'SD' },
            { name: 'hqdefault.jpg', label: '고화질 (HQ)', id: 'HQ' },
            { name: 'mqdefault.jpg', label: '중간화질 (MQ)', id: 'MQ' }
        ];

        qualities.forEach(q => {
            const imgUrl = `https://img.youtube.com/vi/${videoId}/${q.name}`;
            
            const card = document.createElement('div');
            card.className = 'thumb-card';
            card.innerHTML = `
                <h4>${q.label}</h4>
                <img src="${imgUrl}" alt="${q.label}" onerror="this.parentElement.style.display='none'">
                <button class="download-btn" onclick="downloadImage('${imgUrl}', 'youtube-thumb-${q.id}.jpg')">이미지 다운로드</button>
            `;
            grid.appendChild(card);
        });
    }

    async function downloadImage(url, filename) {
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(blobUrl);
        } catch (error) {
            alert('다운로드 중 오류가 발생했습니다. 이미지를 우클릭하여 저장해주세요.');
        }
    }
</script>

</body>
</html>
