<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유튜브 썸네일 추출기</title>
    <style>
        :root {
            --primary-color: #ff0000;
            --bg-color: #f9f9f9;
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h2 { color: #333; margin-bottom: 25px; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; }
        input { flex: 1; max-width: 500px; padding: 12px 15px; border: 2px solid #ddd; border-radius: 8px; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: var(--primary-color); }
        button.extract-btn { background: var(--primary-color); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* 결과 카드 그리드 레이아웃 */
        #result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .thumb-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 15px; transition: transform 0.2s; }
        .thumb-card:hover { transform: translateY(-5px); }
        .thumb-card img { width: 100%; border-radius: 8px; margin-bottom: 15px; }
        .thumb-card h4 { margin: 10px 0; color: #555; font-size: 14px; }
        
        .download-btn { display: inline-block; width: 100%; background: #333; color: white; text-decoration: none; padding: 10px 0; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; }
        .download-btn:hover { background: #000; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 유튜브 썸네일 추출기 Pro</h2>
    <div class="input-group">
        <input type="text" id="videoUrl" placeholder="유튜브 영상 링크를 입력하세요 (예: https://youtu.be/...)">
        <button class="extract-btn" onclick="extractThumbnails()">추출하기</button>
    </div>

    <div id="result-grid">
        </div>
</div>

<script>
    async function extractThumbnails() {
        const url = document.getElementById('videoUrl').value;
        const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
        const match = url.match(regExp);
        const videoId = (match && match[7].length == 11) ? match[7] : false;

        if (!videoId) {
            alert("유효한 유튜브 링크를 입력해주세요!");
            return;
        }

        const grid = document.getElementById('result-grid');
        grid.innerHTML = ''; // 이전 결과 초기화

        // 제공할 해상도 정보 (파일명, 라벨)
        const qualities = [
            { name: 'maxresdefault.jpg', label: '최고화질 (HD)', id: 'MAX' },
            { name: 'sddefault.jpg', label: '표준화질 (SD)', id: 'SD' },
            { name: 'hqdefault.jpg', label: '고화질 (HQ)', id: 'HQ' },
            { name: 'mqdefault.jpg', label: '중간화질 (MQ)', id: 'MQ' }
        ];

        qualities.forEach(q => {
            const imgUrl = `https://img.youtube.com/vi/${videoId}/${q.name}`;
            
            const card = document.createElement('div');
            card.className = 'thumb-card';
            card.innerHTML = `
                <h4>${q.label}</h4>
                <img src="${imgUrl}" alt="${q.label}" onerror="this.parentElement.style.display='none'">
                <button class="download-btn" onclick="downloadImage('${imgUrl}', 'youtube-thumb-${q.id}.jpg')">이미지 다운로드</button>
            `;
            grid.appendChild(card);
        });
    }

    // 크로스 도메인 이슈를 해결하여 이미지를 바로 다운로드하게 해주는 함수
    async function downloadImage(url, filename) {
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(blobUrl);
        } catch (error) {
            alert('다운로드 중 오류가 발생했습니다. 이미지를 우클릭하여 저장해주세요.');
        }
    }
</script>

</body>
</html>
